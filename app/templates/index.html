<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digourd-IA</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <div class="logo">DI</div>
        <div>
          <h1>Digourd-IA</h1>
          <p>L'esperta dei proverbi</p>
        </div>
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="it" onclick="setLang('it')">🇮🇹</button>
          <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">🇫🇷</button>
        </div>
      </div>

      <div class="info-card about">
        <h2>Chi sono</h2>
        <p>
          Digourd-IA recupera proverbi in patois, le loro traduzioni e il loro
          significato a partire dalla tua domanda.
        </p>
      </div>

      <div class="info-card examples">
        <h2>Esempi</h2>
        <button class="example-btn" onclick="fillExample('Cerco un proverbio sulla pazienza')">Pazienza</button>
        <button class="example-btn" onclick="fillExample('Voglio un proverbio sulla ricchezza e il destino')">Ricchezza</button>
        <button class="example-btn" onclick="fillExample('Trova un proverbio sulle cose certe contro le promesse')">Certezza</button>
      </div>
    </aside>

    <section class="chat-panel">
      <header class="chat-header">
        <div>
          <h2>Parla con Digourd-IA</h2>
          <p>Fai una domanda in linguaggio naturale.</p>
        </div>
        <div class="status-pill">● Online</div>
      </header>

      <div id="chat" class="chat-messages"></div>

      <div class="composer">
        <textarea
          id="message"
          placeholder="Es.: Cerco un proverbio sul fatto che dopo la pioggia viene il sole"
        ></textarea>
        <div class="composer-actions">
          <button id="sendBtn" onclick="sendMessage()">Invia</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
